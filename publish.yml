# Publish manifest — controls what appears on the `main` branch.
#
# Edit this file on the `dev` branch. When you push to `dev`, the
# GitHub Action (or `scripts/publish_to_main.py`) reads this manifest
# and rebuilds the `main` branch with only the listed content.
#
# To release a new exercise: add its folder name to `exercises:` and push.

# GitHub owner/repo — used to generate Colab links in the README
github_repo: marco-willi/cas-dl-compvis-exercises-fs2026

# Exercises to publish (folder names under exercises/)
# Order here = order in the README
exercises:
  - folder: 00_pytorch
    title: "PyTorch Recap"
  - folder: 01_image_data
    title: "Images as Data"
  - folder: 02_classification
    title: "Image Classification"
  - folder: 03_retrieval
    title: "Image Retrieval"
  - folder: 04_adaptation
    title: "Pre-Trained Model Adaptation"
  - folder: 04_adaptation_lora
    title: "LoRa Adaptation"
  - folder: 05_backbones
    title: "Vision Backbones"

# Extra files/directories to include on main (paths relative to repo root)
# Note: requirements.txt is auto-generated by publish_to_main.py and added to main;
# do not list it here.
include:
  - pyproject.toml
  - poetry.lock
